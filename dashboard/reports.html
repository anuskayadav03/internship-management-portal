<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            Internship Portal
        </a>

        <div>
            <a href="index.html" class="btn btn-light btn-sm">Dashboard</a>
            <a href="students.html" class="btn btn-light btn-sm">Students</a>
            <a href="reports.html" class="btn btn-light btn-sm">Reports</a>
            <a href="profile.html" class="btn btn-light btn-sm">Profile</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Reports</h2>

    <!-- Search -->
    <input
        type="search"
        id="searchReport"
        class="form-control mb-3"
        placeholder="Search reports..."
    >

    <!-- Loading -->
    <div id="loading" class="text-center">
        <div class="spinner-border text-primary"></div>
        <p>Loading Reports...</p>
    </div>

    <!-- Table -->
    <table class="table table-bordered table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="reportTable"></tbody>
    </table>

    <!-- Pagination -->
    <div class="text-center mt-3">
        <button id="prevBtn" class="btn btn-primary">Previous</button>
        <span id="pageNumber">1</span>
        <button id="nextBtn" class="btn btn-primary">Next</button>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/reports.js"></script>

</body>
</html>
