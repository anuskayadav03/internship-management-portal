<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="index.html">
Internship Portal
</a>

<div>

<a href="index.html" class="btn btn-light btn-sm">
Dashboard
</a>

<a href="students.html" class="btn btn-warning btn-sm">
Students
</a>

<a href="reports.html" class="btn btn-light btn-sm">
Reports
</a>

<a href="profile.html" class="btn btn-light btn-sm">
Profile
</a>

<button onclick="logout()" class="btn btn-danger btn-sm">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<h2 class="text-center mb-4">
Student Management
</h2>

<div class="row">

<div class="col-md-4">

<input
type="text"
id="searchInput"
class="form-control"
placeholder="Search Student">

</div>

<div class="col-md-4">

<select
id="filterStatus"
class="form-select">

<option value="all">
All Students
</option>

<option value="active">
Active
</option>

<option value="inactive">
Inactive
</option>

</select>

</div>

<div class="col-md-4 text-end">

<button
class="btn btn-success"
data-bs-toggle="modal"
data-bs-target="#studentModal">

Add Student

</button>

<button
class="btn btn-primary"
onclick="exportStudents()">

Export JSON

</button>

</div>

</div>

<div class="mt-3">

<input
type="file"
id="importFile"
class="form-control">

</div>

<div
id="toast"
class="alert alert-success mt-3 d-none">

Action Completed

</div>

<div
id="loading"
class="text-center mt-4">

<div class="spinner-border text-primary"></div>

<p>Loading Students...</p>

</div>

<table
class="table table-bordered table-hover mt-4 d-none"
id="studentTable">

<thead class="table-primary">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="studentBody">

</tbody>

</table>

<div class="d-flex justify-content-between">

<button
id="prevBtn"
class="btn btn-primary">

Previous

</button>

<span id="pageNumber">

1

</span>

<button
id="nextBtn"
class="btn btn-primary">

Next

</button>

</div>

</div>

<!-- Modal -->

<div
class="modal fade"
id="studentModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>

Student Form

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<input
id="studentName"
class="form-control mb-3"
placeholder="Student Name">

<input
id="studentEmail"
class="form-control mb-3"
placeholder="Email">

<select
id="studentStatus"
class="form-select">

<option value="active">
Active
</option>

<option value="inactive">
Inactive
</option>

</select>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveStudent()">

Save

</button>

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Close

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/students.js"></script>

</body>

</html>
