<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Management Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                Internship Portal
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a href="index.html" class="nav-link active">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a href="students.html" class="nav-link">Students</a>
                    </li>

                    <li class="nav-item">
                        <a href="reports.html" class="nav-link">Reports</a>
                    </li>

                    <li class="nav-item">
                        <a href="profile.html" class="nav-link">Profile</a>
                    </li>

                </ul>

                <button id="themeBtn" class="btn btn-warning ms-3">
                     Theme
                </button>

                <button onclick="logout()" class="btn btn-danger ms-2">
                    Logout
                </button>

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        <h2 id="welcomeText" class="text-center mb-4"></h2>

    

        <div id="loading" class="text-center">

            <div class="spinner-border text-primary"></div>

            <p class="mt-2">
                Loading Dashboard...
            </p>

        </div>

        <div id="dashboardCards" class="row g-4 d-none">

            <div class="col-md-3">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <h5>Total Students</h5>

                        <h2 id="studentCount">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <h5>Total Reports</h5>

                        <h2 id="reportCount">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <h5>Attendance</h5>

                        <h2 id="activeCount">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <h5>Performance</h5>

                        <h2 id="pendingCount">0</h2>

                    </div>

                </div>

            </div>

        </div>

        <div class="row mt-5">

            <div class="col-lg-8">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        Dashboard Analytics

                    </div>

                    <div class="card-body">

                        <canvas id="dashboardChart"></canvas>

                    </div>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        User Information

                    </div>

                    <div class="card-body">

                        <h5 id="roleName"></h5>

                        <p id="emailText"></p>

                    </div>

                </div>

            </div>

        </div>

        <div id="error" class="alert alert-danger mt-4 d-none">

            Failed to load dashboard.

        </div>

    </div>
    <div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Attendance</h5>

<h2 id="attendanceCount">96%</h2>

</div>

</div>

</div>
<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Performance</h5>

<h2 id="performanceCount">89%</h2>

</div>

</div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>

    <script src="js/dashboard.js"></script>

</body>

</html>
