<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Management Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Loading Spinner -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <header>
        <h1>Internship Management Portal</h1>
    </header>

    <!-- Dashboard -->
    <section class="dashboard">
        <div class="card">
            <h3>Total Students</h3>
            <p id="totalStudents">0</p>
        </div>

        <div class="card">
            <h3>Active Students</h3>
            <p id="activeStudents">0</p>
        </div>

        <div class="card">
            <h3>Inactive Students</h3>
            <p id="inactiveStudents">0</p>
        </div>

        <div class="card">
            <h3>Average Attendance</h3>
            <p id="avgAttendance">0%</p>
        </div>
    </section>

    <!-- Student Form -->
    <section class="form-section">

        <h2>Add Student</h2>

        <form id="studentForm">

            <input
                type="hidden"
                id="studentIndex"
            >

            <input
                type="text"
                id="name"
                placeholder="Student Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="number"
                id="attendance"
                placeholder="Attendance (%)"
                min="0"
                max="100"
                required
            >

            <input
                type="number"
                id="performance"
                placeholder="Performance (%)"
                min="0"
                max="100"
                required
            >

            <select id="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>

            <button type="submit">
                Save Student
            </button>

        </form>

    </section>

    <!-- Search Filter Sort -->
    <section class="controls">

        <input
            type="text"
            id="search"
            placeholder="Search Student..."
        >

        <select id="filterStatus">
            <option value="All">All Students</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
        </select>

        <select id="sortBy">
            <option value="">Sort By</option>
            <option value="name">Name</option>
            <option value="attendance">Attendance</option>
            <option value="performance">Performance</option>
        </select>

        <button id="exportBtn">
            Export JSON
        </button>

        <input
            type="file"
            id="importFile"
            accept=".json"
        >

    </section>

    <!-- Students Table -->
    <section class="table-section">

        <table>

            <thead>

                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Attendance</th>
                    <th>Performance</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </section>

    <!-- Analytics -->
    <section class="analytics">

        <h2>Dashboard Analytics</h2>

        <div class="card">
            <p>Top Performer</p>
            <h3 id="topPerformer">-</h3>
        </div>

        <div class="card">
            <p>Highest Attendance</p>
            <h3 id="highestAttendance">-</h3>
        </div>

    </section>

    <script src="js/validation.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/students.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
