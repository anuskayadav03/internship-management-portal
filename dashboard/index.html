<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Internship Management Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
Internship Portal
</a>

<div>

<a href="index.html" class="btn btn-light btn-sm">Dashboard</a>

<a href="students.html" class="btn btn-light btn-sm">Students</a>

<a href="reports.html" class="btn btn-light btn-sm">Reports</a>

<a href="profile.html" class="btn btn-light btn-sm">Profile</a>

<button id="themeBtn" class="btn btn-warning btn-sm">
Theme
</button>

<button onclick="logout()" class="btn btn-danger btn-sm">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<div id="loading" class="text-center">

<div class="spinner-border text-primary"></div>

<p class="mt-2">
Loading Dashboard...
</p>

</div>

<div id="error" class="alert alert-danger d-none">

Failed to load dashboard.

</div>

<div id="dashboardCards" class="d-none">

<h2 id="welcomeText"></h2>

<p id="roleName"></p>

<p id="emailText"></p>

<div class="row">

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Total Students</h5>

<h2 id="studentCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Total Reports</h5>

<h2 id="reportCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Active Students</h5>

<h2 id="activeCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Pending Reports</h5>

<h2 id="pendingCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Attendance</h5>

<h2>96%</h2>

</div>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow">

<div class="card-body text-center">

<h5>Performance</h5>

<h2>89%</h2>

</div>

</div>

</div>

</div>

<div class="card shadow mt-4">

<div class="card-header bg-primary text-white">

Dashboard Analytics

</div>

<div class="card-body">

<canvas id="dashboardChart" height="120"></canvas>

</div>

</div>

</div>

</div>

<script src="api.js"></script>
<script src="dashboard.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
