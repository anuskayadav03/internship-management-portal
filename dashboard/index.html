<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Management Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            Internship Management Portal
        </a>

        <div>
            <a href="index.html" class="btn btn-light btn-sm">Dashboard</a>
            <a href="students.html" class="btn btn-light btn-sm">Students</a>
            <a href="reports.html" class="btn btn-light btn-sm">Reports</a>
            <a href="profile.html" class="btn btn-light btn-sm">Profile</a>
        </div>
    </div>
</nav>

<!-- Dashboard -->
<div class="container mt-5">

    <h2 class="text-center mb-4">
        Dashboard Analytics
    </h2>

    <!-- Loading -->
    <div id="loading" class="text-center">
        <div class="spinner-border text-primary"></div>
        <p>Loading Dashboard...</p>
    </div>

    <!-- Cards -->
    <div id="dashboardCards" class="row g-4 d-none">

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Total Students</h5>
                    <h2 id="studentCount">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Total Reports</h5>
                    <h2 id="reportCount">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Active Users</h5>
                    <h2 id="activeCount">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Pending Reports</h5>
                    <h2 id="pendingCount">0</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Error -->
    <div id="error" class="alert alert-danger mt-4 d-none">
        Something went wrong while fetching data.
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
