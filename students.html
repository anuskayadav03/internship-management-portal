<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Internship Portal</a>

        <div>
            <a href="index.html" class="btn btn-light btn-sm">Dashboard</a>
            <a href="students.html" class="btn btn-light btn-sm">Students</a>
            <a href="reports.html" class="btn btn-light btn-sm">Reports</a>
            <a href="profile.html" class="btn btn-light btn-sm">Profile</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Students</h2>

    <!-- Search -->
    <div class="row mb-3">
        <div class="col-md-6">
            <input
                type="search"
                id="searchInput"
                class="form-control"
                placeholder="Search student..."
            >
        </div>

        <div class="col-md-6">
            <select id="filterCompany" class="form-select">
                <option value="">All Companies</option>
            </select>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center">
        <div class="spinner-border text-primary"></div>
        <p>Loading Students...</p>
    </div>

    <!-- Cards -->
    <div id="studentContainer" class="row g-4"></div>

    <!-- Pagination -->
    <div class="text-center mt-4">
        <button id="prevBtn" class="btn btn-primary">Previous</button>
        <span id="pageNumber" class="mx-3">1</span>
        <button id="nextBtn" class="btn btn-primary">Next</button>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/students.js"></script>

</body>
</html>
